        function safeGetItem(k) { try { return localStorage.getItem(k); } catch(e) { return null; } }
        function safeSetItem(k, v) { try { localStorage.setItem(k, v); } catch(e) {} }
        function safeRemoveItem(k) { try { localStorage.removeItem(k); } catch(e) {} }

        function getWrongBook() {
            const raw = safeGetItem('wrongBook');
            return raw ? new Set(JSON.parse(raw)) : new Set();
        }
        function saveWrongBook(book) { safeSetItem('wrongBook', JSON.stringify([...book])); }

        function getDoneBook() {
            const raw = safeGetItem('doneBook');
            return raw ? new Set(JSON.parse(raw)) : new Set();
        }
        function saveDoneBook(book) { safeSetItem('doneBook', JSON.stringify([...book])); }

        function saveProgress() {
            safeSetItem('currentProgress', JSON.stringify({
                queue: questionQueue,
                index: currentQueueIndex,
                total: totalToDo,
                status: questionStatus
            }));
        }
        function clearProgress() { safeRemoveItem('currentProgress'); }
        function loadProgress() {
            const raw = safeGetItem('currentProgress');
            if (!raw) return null;
            try {
                const obj = JSON.parse(raw);
                if (obj.queue && Array.isArray(obj.queue) && typeof obj.index === 'number' && obj.total)
                    return obj;
            } catch(e) {}
            return null;
        }

                <div class="stat-item"><div class="stat-number">${multi}</div><div class="stat-label">多选</div></div>
                <div class="stat-item"><div class="stat-number">${judge}</div><div class="stat-label">判断</div></div>
                <div class="stat-item"><div class="stat-number">${doneCnt}</div><div class="stat-label">已做</div></div>
                <div class="stat-item"><div class="stat-number">${wrongCnt}</div><div class="stat-label">错题</div></div>
            `;
        }

        document.getElementById('countSelect').addEventListener('change', function() {
            document.getElementById('customCount').style.display = this.value === 'custom' ? 'inline-block' : 'none';
            if (this.value === 'custom') document.getElementById('customCount').focus();
        });

        function getQuestionById(id) {
            return allQuestions.find(q => q.id == id);
        }

        // ========== 开始练习 ==========
        function startPractice() {
            clearProgress();
            document.getElementById('resumeArea').innerHTML = '';

            const type = document.getElementById('typeFilter').value;
            const mode = document.getElementById('modeFilter').value;
            const doneBook = getDoneBook();
            const wrongBook = getWrongBook();

            let pool = allQuestions.filter(q => type === 'all' ? true : q.type === type);
            if (mode === 'wrong') pool = pool.filter(q => wrongBook.has(q.id));
            else if (mode === 'unanswered') pool = pool.filter(q => !doneBook.has(q.id));

            if (pool.length === 0) {
                document.getElementById('questionContainer').innerHTML = '<div class="empty-state">📭 没有符合条件的题目</div>';
                return;
            }

            pool.sort((a, b) => a.id - b.id);
            let count;
            const countSelect = document.getElementById('countSelect');
            if (countSelect.value === 'all') count = pool.length;
            else if (countSelect.value === 'custom') {
                const cv = parseInt(document.getElementById('customCount').value, 10);
                if (isNaN(cv) || cv < 1) { alert('请输入有效的题数'); return; }
                count = Math.min(cv, pool.length);
            } else {
                count = Math.min(parseInt(countSelect.value, 10), pool.length);
            }

            questionQueue = pool.slice(0, count).map(q => q.id);
            totalToDo = questionQueue.length;
            currentQueueIndex = 0;
            answered = false;
            userAnswer = null;
            questionStatus = {};

            saveProgress();
            loadCurrentQuestion();
        }

        // ========== 恢复进度 ==========
        function resumePractice(progress) {
            document.getElementById('resumeArea').innerHTML = '';
            questionQueue = progress.queue;
            currentQueueIndex = progress.index;
            totalToDo = progress.total;
            questionStatus = progress.status || {};

            const validIds = questionQueue.filter(id => getQuestionById(id));
            if (validIds.length === 0) {
                alert('上次的进度已失效，将清除进度。');
                clearProgress();
                document.getElementById('questionContainer').innerHTML = '<div class="empty-state">⬆️ 请重新选择条件并开始做题</div>';
                return;
            }
            questionQueue = validIds;
            totalToDo = validIds.length;
            if (currentQueueIndex >= validIds.length) currentQueueIndex = 0;

            loadCurrentQuestion();
        }

        function loadCurrentQuestion() {
            const id = questionQueue[currentQueueIndex];
            currentQuestion = getQuestionById(id);
            if (!currentQuestion) {
                alert('题目数据异常');
                return;
            }
            const status = questionStatus[id];
            if (status && status.isCorrect !== undefined) {
                answered = true;
                userAnswer = status.userAnswer || null;
            } else {
                answered = false;
                userAnswer = null;
            }
            renderQuestion();
        }

        // ========== 渲染 ==========
        function renderQuestion() {
            if (!currentQuestion) return;
            const q = currentQuestion;
            const container = document.getElementById('questionContainer');
            const progressText = `第 ${currentQueueIndex + 1} / ${totalToDo} 题`;

            let optionsHtml = '';
            q.options.forEach((opt, idx) => {
                const letter = String.fromCharCode(65 + idx);
                let cls = 'option-item';
                if (answered && userAnswer) {
                    if (q.type === '选择' || q.type === '判断') {
                        if (userAnswer === letter) cls += ' selected';
                    } else {
                        if (userAnswer.includes(letter)) cls += ' selected';
                    }
                }
                optionsHtml += `<div class="${cls}" data-letter="${letter}"><span class="option-letter">${letter}</span><span>${opt}</span></div>`;
            });

            container.innerHTML = `
                <div class="question-card">
                    <div class="progress">${progressText}</div>
                    <span class="question-type">${q.type}</span>
                    <div class="question-text">${q.id}. ${q.question}</div>
                    <div class="options">${optionsHtml}</div>
                    <div class="action-row">
                        <button class="btn-prev" onclick="prevQuestion()">◀ 上一题</button>
                        <button class="btn-submit" onclick="submitAnswer()">✅ 提交</button>
                        <button class="btn-show-answer" onclick="showAnswer()">👁️ 答案</button>
                        <button class="btn-next" onclick="nextQuestion()">下一题 ▶</button>
                    </div>
                    <div id="resultArea"></div>
                </div>`;

            // 如果已答，显示结果并禁止操作
            if (answered) {
                const status = questionStatus[q.id];
                if (status && status.resultHtml) {
                    document.getElementById('resultArea').innerHTML = status.resultHtml;
                }
                document.querySelectorAll('.option-item').forEach(el => el.style.pointerEvents = 'none');
            } else {
                // 绑定选项点击
                document.querySelectorAll('.option-item').forEach(el => {
                    el.addEventListener('click', function(e) {
                        if (answered) return;
                        const now = Date.now();
                        const letter = this.dataset.letter;
                        if (q.type === '选择' || q.type === '判断') {
                            document.querySelectorAll('.option-item').forEach(opt => opt.classList.remove('selected'));
                            this.classList.add('selected');
                            userAnswer = letter;
                        } else {
                            this.classList.toggle('selected');
                            const sel = [];
                            document.querySelectorAll('.option-item.selected').forEach(el => sel.push(el.dataset.letter));
                            userAnswer = sel.sort().join('');
                        }
                        if (now - lastTapTime < 300) submitAnswer();
                        lastTapTime = now;
                    });
                });
            }
        }

        // ========== 上一题 ==========
        function prevQuestion() {
            if (currentQueueIndex > 0) {
                saveTempState();
                currentQueueIndex--;
                loadCurrentQuestion();
                saveProgress();
            }
        }

        function nextQuestion() {
            saveTempState();
            currentQueueIndex++;
            if (currentQueueIndex < totalToDo) {
                loadCurrentQuestion();
                saveProgress();
            } else {
                finishPractice();
            }
        }

        function saveTempState() {
            if (!currentQuestion) return;
            const id = currentQuestion.id;
            if (!answered && userAnswer) {
                // 有选择但未提交，暂存但不标记对错
                questionStatus[id] = {
                    userAnswer: userAnswer,
                    correctAnswer: null,
                    isCorrect: undefined,  // 未提交，不算完成
                    resultHtml: null
                };
            }
            // 如果已答，questionStatus 早已存在，不动
        }

        // ========== 提交答案 ==========
        function submitAnswer() {
            if (!currentQuestion || answered) return;
            if (!userAnswer) { alert('请先选择答案'); return; }
            finalizeAnswer(userAnswer, false);
        }

        // ========== 查看答案（算错）==========
        function showAnswer() {
            if (!currentQuestion || answered) return;
            finalizeAnswer(null, true);
        }

        function finalizeAnswer(userAns, isShowAnswer) {
            const q = currentQuestion;
            const correct = q.answer;
            let isCorrect = false;
            let finalUserAnswer = userAns;

            if (isShowAnswer) {
                finalUserAnswer = '';   // 未选择
                isCorrect = false;       // 算错
            } else {
                isCorrect = (finalUserAnswer === correct);
            }

            answered = true;
            const doneBook = getDoneBook();
            const wrongBook = getWrongBook();
            doneBook.add(q.id);
            saveDoneBook(doneBook);

            let resultHtml = '';
            if (isCorrect) {
                resultHtml = '<div class="result correct">✅ 回答正确！</div>';
                if (wrongBook.has(q.id)) {
                    wrongBook.delete(q.id);
                    saveWrongBook(wrongBook);
                }
            } else {
                resultHtml = `<div class="result incorrect">❌ 错误，正确答案是：<b>${correct}</b></div>`;
                wrongBook.add(q.id);
                saveWrongBook(wrongBook);
            }

            questionStatus[q.id] = {
                userAnswer: finalUserAnswer,
                correctAnswer: correct,
                isCorrect: isCorrect,
                resultHtml: resultHtml
            };

            document.getElementById('resultArea').innerHTML = resultHtml;
            highlightAnswer(correct, finalUserAnswer);
            saveProgress();
            updateStats();
        }

        function highlightAnswer(correct, user) {
            const allOpts = document.querySelectorAll('.option-item');
            allOpts.forEach(el => el.style.pointerEvents = 'none');
            if (currentQuestion.type === '判断') {
                const map = { '正确':'A', '错误':'B' };
                const cLetter = map[correct] || correct;
                const uLetter = map[user] || user;
                allOpts.forEach(el => {
                    const letter = el.dataset.letter;
                    if (letter === cLetter) el.classList.add('selected');
                    else if (letter === uLetter && letter !== cLetter) el.classList.add('wrong');
                });
            } else {
                const cLetters = correct.split('');
                const uLetters = (user || '').split('');
                allOpts.forEach(el => {
                    const letter = el.dataset.letter;
                    if (cLetters.includes(letter)) el.classList.add('selected');
                    else if (uLetters.includes(letter)) el.classList.add('wrong');
                });
            }
        }

        // ========== 完成练习 ==========
        function finishPractice() {
            clearProgress();
            const container = document.getElementById('questionContainer');

            let gridHtml = '<div class="overview-grid">';
            questionQueue.forEach(id => {
                const status = questionStatus[id];
                let cls = 'unanswered';
                let label = '?';
                if (status && typeof status.isCorrect === 'boolean') {
                    cls = status.isCorrect ? 'correct-status' : 'wrong-status';
                    label = status.isCorrect ? '✓' : '✗';
                }
                gridHtml += `<div class="overview-item ${cls}" onclick="jumpToQuestion(${id})">${label}</div>`;
            });
            gridHtml += '</div>';

            container.innerHTML = `
                <div class="finish-card">
                    <h2>🎉 本轮练习完成！</h2>
                    <p style="margin:10px 0;">共 ${totalToDo} 题，已完成。</p>
                    ${gridHtml}
                    <p style="font-size:0.8rem; color:#7f8c8d;">✓正确  ✗错误  ?未做（点击可跳转）</p>
                    <button onclick="startPractice()" style="margin-top:15px; padding:10px 30px; background:#2e86c1; color:white; border:none; border-radius:8px; font-size:1rem; cursor:pointer;">🔄 重新开始</button>
                </div>`;
        }

        function jumpToQuestion(id) {
            const idx = questionQueue.indexOf(id);
            if (idx === -1) return;
            currentQueueIndex = idx;
            totalToDo = questionQueue.length;
            loadCurrentQuestion();
            saveProgress();
            document.getElementById('questionContainer').scrollIntoView({ behavior: 'smooth' });
        }

        function clearAllRecords() {
            if (confirm('确定要清除所有错题、已做记录和当前练习进度吗？')) {
                safeRemoveItem('wrongBook');
                safeRemoveItem('doneBook');
                clearProgress();
                updateStats();
                document.getElementById('questionContainer').innerHTML = '<div class="empty-state">✅ 所有记录已清除</div>';
                document.getElementById('resumeArea').innerHTML = '';
            }
        }

        // ========== 初始化 ==========
        window.addEventListener('load', () => {
            updateStats();
            const progress = loadProgress();
            if (progress && progress.queue && progress.queue.length > 0) {
                document.getElementById('resumeArea').innerHTML = `
                    <div class="resume-prompt">
                        <p>📌 上次做到第 <b>${progress.index + 1}</b> / ${progress.total} 题</p>
                        <button id="resumeBtn" style="margin:5px; padding:10px 20px; background:#27ae60; color:white; border:none; border-radius:8px;">✅ 继续上次</button>
                        <button id="discardBtn" style="margin:5px; padding:10px 20px; background:#95a5a6; color:white; border:none; border-radius:8px;">🗑 放弃进度</button>
                    </div>`;
                document.getElementById('resumeBtn').onclick = () => resumePractice(progress);
                document.getElementById('discardBtn').onclick = () => {
                    clearProgress();
                    document.getElementById('resumeArea').innerHTML = '';
                };
            }
            document.getElementById('questionContainer').innerHTML = '<div class="empty-state">⬆️ 选择筛选条件，然后点「开始做题」</div>';
        });
    </script>
</body>
</html>
